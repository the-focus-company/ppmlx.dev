<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #07080a;
    font-family: 'Outfit', system-ui, sans-serif;
    color: #e8eaed;
    position: relative;
  }

  /* Grid background */
  .grid {
    position: absolute; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(21, 24, 30, 0.7) 1px, transparent 1px),
      linear-gradient(90deg, rgba(21, 24, 30, 0.7) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, rgba(0,0,0,0.5) 0%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, rgba(0,0,0,0.5) 0%, transparent 100%);
  }

  /* Noise texture */
  .noise {
    position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  /* Primary glow — warm orange, centered high */
  .glow-primary {
    position: absolute;
    top: -10%; left: 50%; transform: translateX(-50%);
    width: 900px; height: 500px;
    background: radial-gradient(ellipse, rgba(212, 131, 60, 0.10) 0%, transparent 70%);
    z-index: 0;
  }

  /* Secondary glow — teal accent, bottom-right */
  .glow-secondary {
    position: absolute;
    bottom: -20%; right: -5%;
    width: 500px; height: 400px;
    background: radial-gradient(ellipse, rgba(61, 181, 166, 0.05) 0%, transparent 70%);
    z-index: 0;
  }

  /* Content */
  .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%;
    padding: 60px 80px;
  }

  /* Logo */
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 42px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 32px;
  }
  .logo .accent { color: #d4833c; }

  /* Headline */
  .headline {
    font-family: 'Crimson Pro', Georgia, serif;
    font-weight: 300;
    font-size: 64px;
    line-height: 1.08;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
    max-width: 750px;
  }
  .headline em {
    font-style: italic;
    color: #e8a04c;
  }

  /* Subtitle */
  .subtitle {
    font-size: 20px;
    font-weight: 300;
    color: #8b919e;
    line-height: 1.5;
    margin-bottom: 44px;
    max-width: 620px;
  }
  .subtitle strong {
    color: #e8eaed;
    font-weight: 400;
  }

  /* Stats row */
  .stats {
    display: flex;
    gap: 48px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    color: #e8a04c;
  }
  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #545a66;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Terminal snippet floating on the right */
  .terminal-float {
    position: absolute;
    right: 64px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 3;
    width: 340px;
  }
  .term-window {
    background: #0d0f13;
    border: 1px solid #1e2229;
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
      0 4px 32px rgba(0, 0, 0, 0.5),
      0 0 80px rgba(212, 131, 60, 0.04);
  }
  .term-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    background: #13161c;
    border-bottom: 1px solid #1e2229;
  }
  .term-dot {
    width: 9px; height: 9px; border-radius: 50%;
  }
  .term-dot.r { background: #e85d75; }
  .term-dot.y { background: #e8a04c; }
  .term-dot.g { background: #3db5a6; }
  .term-title {
    flex: 1;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #545a66;
    margin-right: 27px;
  }
  .term-body {
    padding: 18px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
  }
  .term-line {
    white-space: nowrap;
  }
  .prompt-char { color: #d4833c; }
  .cmd { color: #e8eaed; }
  .comment { color: #545a66; }
  .success { color: #3db5a6; }
  .dim { color: #8b919e; }

  /* Corner badge */
  .corner-badge {
    position: absolute;
    bottom: 40px; right: 64px;
    z-index: 4;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: #545a66;
    letter-spacing: 0.04em;
  }
  .corner-badge a {
    color: #8b919e;
    text-decoration: none;
  }

  /* Decorative line */
  .line-accent {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #d4833c 30%, #e8a04c 50%, #d4833c 70%, transparent);
    z-index: 5;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="noise"></div>
  <div class="glow-primary"></div>
  <div class="glow-secondary"></div>

  <div class="content">
    <div class="logo">pp<span class="accent">mlx</span></div>
    <h1 class="headline">Run LLMs <em>natively</em><br>on Apple Silicon</h1>
    <p class="subtitle">MLX-native inference. <strong>43&ndash;112% faster</strong> than GGUF translation layers. OpenAI-compatible API.</p>
    <div class="stats">
      <div class="stat">
        <span class="stat-value">43&ndash;112%</span>
        <span class="stat-label">faster</span>
      </div>
      <div class="stat">
        <span class="stat-value">168+</span>
        <span class="stat-label">models</span>
      </div>
      <div class="stat">
        <span class="stat-value">:6767</span>
        <span class="stat-label">local API</span>
      </div>
      <div class="stat">
        <span class="stat-value">MIT</span>
        <span class="stat-label">open source</span>
      </div>
    </div>
  </div>

  <div class="terminal-float">
    <div class="term-window">
      <div class="term-bar">
        <div class="term-dot r"></div>
        <div class="term-dot y"></div>
        <div class="term-dot g"></div>
        <div class="term-title">ppmlx</div>
      </div>
      <div class="term-body">
        <div class="term-line"><span class="prompt-char">$</span> <span class="cmd">pip install ppmlx</span></div>
        <div class="term-line"><span class="prompt-char">$</span> <span class="cmd">ppmlx pull qwen3.5:9b</span></div>
        <div class="term-line"><span class="success">&check;</span> <span class="dim">Downloaded 5.2 GB</span></div>
        <div class="term-line"><span class="prompt-char">$</span> <span class="cmd">ppmlx serve</span></div>
        <div class="term-line"><span class="success">&check;</span> <span class="dim">Listening on :6767</span></div>
      </div>
    </div>
  </div>

  <div class="line-accent"></div>
</body>
</html>
